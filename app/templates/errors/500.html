{% extends 'base.html' %}

{% block title %}Error Server Internal - 500{% endblock %}

{% block content %}
<div class="glass-card text-center py-5 d-flex flex-column align-items-center gap-3">
    <div class="text-danger mb-2">
        <i class="fas fa-bug fa-5x"></i>
    </div>
    <h1 class="fw-bold">500</h1>
    <h3 class="fw-semibold">Error Server Internal</h3>
    <p class="text-secondary" style="max-width: 500px;">
        Terjadi kesalahan pada server saat memproses permintaan Anda. Tim teknis sedang berupaya memperbaikinya.
    </p>
    <a href="{{ url_for('dashboard.index') }}" class="btn-primary text-decoration-none mt-3">
        <i class="fas fa-home"></i>
        <span>Kembali ke Beranda</span>
    </a>
</div>
{% endblock %}
